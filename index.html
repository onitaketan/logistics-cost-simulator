<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物流コスト比較シミュレーター（複数商品）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --border:#e2dfd8;
  --border2:#ccc9c0;
  --text:#1a1816;
  --text2:#6b6860;
  --text3:#a09d98;
  --self:#6b6860;
  --max:#b86a18;
  --fba:#1a7a56;
  --fba-light:#e8f5ef;
  --ogi:#2e6ea6;
  --ogi-light:#e6f0f8;
  --danger:#c0392b;
  --warning:#b86a18;
  --success:#1a7a56;
  --radius:10px;
  --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;font-size:14px}
.page{max-width:1200px;margin:0 auto}
header{margin-bottom:1.5rem}
h1{font-size:22px;font-weight:500;letter-spacing:-.3px;margin-bottom:4px}
.header-sub{font-size:12px;color:var(--text3)}

/* Layout */
.two-col{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.right-col{display:flex;flex-direction:column;gap:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.panel-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.subsection{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px}
.divider{height:1px;background:var(--border);margin:12px 0}

/* Inputs */
.ig{margin-bottom:10px}
.ig:last-child{margin-bottom:0}
.il{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.ir{display:flex;align-items:center;gap:6px}
input[type=number]{font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;outline:none}
input[type=number]:focus{border-color:var(--border2)}
input[type=text]{font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;outline:none}
input[type=text]:focus{border-color:var(--border2)}
select{font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;outline:none}
.unit{font-size:11px;color:var(--text3);white-space:nowrap}

/* Tabs */
.tab-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;white-space:nowrap}
.tab.active{background:var(--surface);border-color:var(--border2);color:var(--text);font-weight:500}
.tab-add{font-size:12px;padding:5px 12px;border:1px dashed var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text3)}
.tab-add:hover{color:var(--text2);border-color:var(--text3)}
.tab-del{font-size:11px;margin-left:4px;color:var(--text3);cursor:pointer;opacity:.7}
.tab-del:hover{opacity:1;color:var(--danger)}

/* Product settings panel */
.product-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:12px}
.prod-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prod-name-input{font-size:15px;font-weight:500;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);padding:2px 4px;outline:none;flex:1}
.prod-name-input:focus{border-color:var(--border2)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Cards */
.cards3{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.card.best{border:2px solid var(--fba);background:var(--fba-light)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-name{font-size:13px;font-weight:500}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-rec{background:#d4ede4;color:#1a7a56}
.badge-cur{background:var(--surface2);color:var(--text3)}
.badge-mid{background:#faeeda;color:#854f0b}
.irow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.irow:last-child{border-bottom:none}
.irow.cost{color:var(--danger)}
.sep{height:1px;background:var(--border2);margin:8px 0}
.tlabel{font-size:11px;color:var(--text2)}
.tval{font-size:22px;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums}
.tval.green{color:var(--success)}
.tval.warn{color:var(--warning)}
.tsub{font-size:11px;color:var(--text2);margin-top:2px}
.tsub.green{color:var(--success)}

/* Slider */
.slider-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slider-label{font-size:12px;color:var(--text2)}
.slider-val{font-size:14px;font-weight:500}
input[type=range]{width:100%;accent-color:#1a7a56}

/* Breakeven */
.be-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.be-label{font-size:11px;color:var(--text3);flex-shrink:0}
.chip{font-size:12px;padding:3px 12px;border-radius:20px;font-weight:500;white-space:nowrap}
.chip.green{background:#d4ede4;color:#1a7a56}
.chip.red{background:#fde8e6;color:#c0392b}
.chip.gray{background:var(--surface2);color:var(--text2)}

/* Chart */
.chart-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.chart-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;height:220px}

/* Table */
.table-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:600;color:var(--text3);text-align:right;padding:6px 10px;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.04em}
th:first-child{text-align:left}
td{padding:5px 10px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);font-variant-numeric:tabular-nums}
td:first-child{text-align:left;color:var(--text);font-weight:500}
tr.hl td{background:#f0faf5;color:#1a7a56}
tr.hl td:first-child{color:#1a7a56}
tr:last-child td{border-bottom:none}

.note{font-size:11px;color:var(--text3);line-height:1.7;margin-top:8px}

@media(max-width:720px){
  .two-col{grid-template-columns:1fr}
  .cards3{grid-template-columns:1fr 1fr}
  .prod-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<header>
  <h1>物流コスト比較シミュレーター</h1>
  <div class="header-sub">自社出荷 vs 扇橋出荷 vs マックスエクスプレス（3PL）vs FBA — 複数商品タブ切替 — 税抜</div>
</header>

<div class="two-col">

<!-- Left: shared 3PL fixed cost settings -->
<div style="display:flex;flex-direction:column;gap:12px">
  <div class="panel">
    <div class="panel-title">マックスエクスプレス 月額固定費（全商品共通）</div>
    <div class="ig">
      <label class="il">WMSプラン</label>
      <select id="g-wms" onchange="calc()">
        <option value="20000">3PLパートナー（20,000円）</option>
        <option value="37500">ライト（37,500円）</option>
        <option value="62500">スタンダード（62,500円）</option>
      </select>
    </div>
    <div class="ig">
      <label class="il">作業スペース</label>
      <div class="ir"><input type="number" id="g-tsubo" value="5" min="1" max="50" oninput="calc()"><span class="unit">坪 × 4,500円</span></div>
    </div>
    <div class="ig">
      <label class="il">パレット保管（追加）</label>
      <div class="ir"><input type="number" id="g-pallet" value="0" min="0" max="100" oninput="calc()"><span class="unit">PL × 2,000円</span></div>
    </div>
    <div class="ig">
      <label class="il">OMS/カート連携</label>
      <select id="g-oms" onchange="calc()">
        <option value="0">なし（0円）</option>
        <option value="10000">あり（10,000円）</option>
      </select>
    </div>
    <div class="ig">
      <label class="il">梱包タイプ</label>
      <select id="g-pack" onchange="calc()">
        <option value="60">直貼り（60円）</option>
        <option value="80">ネコポス（80円）</option>
        <option value="140" selected>60サイズ以上（140円）</option>
      </select>
    </div>
    <div class="ig">
      <label class="il">納品書出力</label>
      <select id="g-nohinso" onchange="calc()">
        <option value="0">なし（0円）</option>
        <option value="10">あり（10円）</option>
      </select>
    </div>
    <div class="ig">
      <label class="il">EC販売手数料率</label>
      <select id="g-rate" onchange="calc()">
        <option value="0.08">8%（ホーム＆キッチン等）</option>
        <option value="0.10">10%</option>
        <option value="0.12">12%</option>
        <option value="0.15">15%</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="ig" style="background:var(--surface2);border-radius:var(--radius-sm);padding:.6rem .75rem">
      <span class="il" style="margin-bottom:2px">固定費合計</span>
      <span id="fixed-total" style="font-size:16px;font-weight:500">—</span>
      <span style="font-size:11px;color:var(--text3)"> 円/月</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">扇橋出荷 固定費・手数料</div>
    <div class="ig">
      <label class="il">保管費</label>
      <div class="ir"><input type="number" id="g-ogi-hokan" value="5000" min="0" step="500" oninput="calc()"><span class="unit">円/月（1坪・3PL分）</span></div>
    </div>
    <div class="ig">
      <label class="il">出庫手数料</label>
      <div class="ir"><input type="number" id="g-ogi-shukko" value="56" min="0" step="1" oninput="calc()"><span class="unit">円/件（税別）</span></div>
    </div>
    <div class="ig">
      <label class="il">入庫手数料</label>
      <div class="ir"><input type="number" id="g-ogi-nyuko" value="300" min="0" step="50" oninput="calc()"><span class="unit">円/PL（税別）</span></div>
    </div>
    <div class="ig">
      <label class="il">月間入庫パレット数</label>
      <div class="ir"><input type="number" id="g-ogi-pl" value="2" min="1" max="50" oninput="calc()"><span class="unit">PL/月</span></div>
    </div>
    <div class="divider"></div>
    <div class="ig" style="background:var(--surface2);border-radius:var(--radius-sm);padding:.6rem .75rem">
      <span class="il" style="margin-bottom:2px">固定費合計</span>
      <span id="ogi-fixed-total" style="font-size:16px;font-weight:500">—</span>
      <span style="font-size:11px;color:var(--text3)"> 円/月</span>
    </div>
  </div>
</div>

<!-- Right -->
<div class="right-col">

  <!-- Slider -->
  <div class="slider-wrap">
    <div class="slider-header">
      <span class="slider-label">月間出荷件数</span>
      <span class="slider-val" id="vol-disp">1,000件</span>
    </div>
    <input type="range" id="vol" min="100" max="5000" value="1000" step="100" oninput="onVol()">
  </div>

  <!-- Product tabs -->
  <div>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="product-panel" id="product-panel"></div>
  </div>

  <!-- Result cards -->
  <div class="cards3" id="cards"></div>

  <!-- Breakeven -->
  <div class="be-bar" id="be-bar"></div>

  <!-- Chart -->
  <div class="chart-panel">
    <div class="chart-header">
      <span class="chart-title" id="chart-title">手取り / 件（出荷量別）</span>
      <div class="legend">
        <span class="leg"><span class="dot" style="background:var(--self)"></span>自社出荷</span>
        <span class="leg"><span class="dot" style="background:var(--ogi)"></span>扇橋</span>
        <span class="leg"><span class="dot" style="background:var(--max)"></span>マックス</span>
        <span class="leg"><span class="dot" style="background:var(--fba)"></span>FBA</span>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <!-- Table -->
  <div class="table-panel">
    <div class="panel-title" style="margin-bottom:12px" id="table-title">出荷量別 手取り比較表（円/件）</div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">件数</th>
          <th>WMS課金</th>
          <th>固定費按分</th>
          <th>自社出荷</th>
          <th>扇橋</th>
          <th>マックス</th>
          <th>FBA</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="note" id="note-text"></p>
  </div>

</div>
</div>
</div>

<script>
const WMS_TIERS=[
  {min:0,   max:299,  cost:15},
  {min:300, max:999,  cost:10},
  {min:1000,max:1999, cost:6},
  {min:2000,max:99999,cost:3}
];
function wmsRate(v){for(const t of WMS_TIERS)if(v>=t.min&&v<=t.max)return t.cost;return 3;}
function fmt(n){return Math.round(n).toLocaleString('ja-JP');}
function fmtD(n){return parseFloat(n.toFixed(1)).toLocaleString('ja-JP');}

// Product store
let products=[
  {id:1,name:'スプレーボトル10本',price:3480,shipFee:360,fbaFee:385,fbaStore:31},
];
let activeId=1;
let nextId=2;

function getFixed(){
  return parseInt(document.getElementById('g-wms').value)
    +(parseInt(document.getElementById('g-tsubo').value)||5)*4500
    +(parseInt(document.getElementById('g-pallet').value)||0)*2000
    +25000
    +parseInt(document.getElementById('g-oms').value);
}
function getRate(){return parseFloat(document.getElementById('g-rate').value);}
function getPack(){return parseInt(document.getElementById('g-pack').value);}
function getNohinso(){return parseInt(document.getElementById('g-nohinso').value);}
function getMaxVar(vol){return 52+wmsRate(vol)+10+30+getNohinso()+getPack();}
function getVol(){return parseInt(document.getElementById('vol').value)||1000;}

function getOgiFixed(){
  return (parseInt(document.getElementById('g-ogi-hokan').value)||5000)
    +(parseInt(document.getElementById('g-ogi-nyuko').value)||300)*(parseInt(document.getElementById('g-ogi-pl').value)||2);
}
function getOgiShukko(){return parseInt(document.getElementById('g-ogi-shukko').value)||56;}

function selfUnit(p,shipFee){
  return p-Math.round(p*getRate())-shipFee;
}
function maxUnit(p,shipFee,vol){
  return p-Math.round(p*getRate())-shipFee-getMaxVar(vol)-getFixed()/vol;
}
function ogiUnit(p,shipFee,vol){
  return p-Math.round(p*getRate())-shipFee-getOgiShukko()-getOgiFixed()/vol;
}
function fbaUnit(p,fbaFee,fbaStore,vol){
  return p-Math.round(p*getRate())-fbaFee-fbaStore-4900/vol;
}

function activeProd(){return products.find(p=>p.id===activeId)||products[0];}

// Tab rendering
function renderTabs(){
  const bar=document.getElementById('tab-bar');
  bar.innerHTML='';
  products.forEach(p=>{
    const t=document.createElement('span');
    t.className='tab'+(p.id===activeId?' active':'');
    t.innerHTML=p.name+(products.length>1?`<span class="tab-del" onclick="deleteProd(${p.id},event)">×</span>`:'');
    t.onclick=(e)=>{if(e.target.classList.contains('tab-del'))return;activeId=p.id;renderTabs();renderProductPanel();calc();};
    bar.appendChild(t);
  });
  const add=document.createElement('span');
  add.className='tab-add';
  add.textContent='+ 商品追加';
  add.onclick=addProd;
  bar.appendChild(add);
}

function deleteProd(id,e){
  e.stopPropagation();
  if(products.length<=1)return;
  products=products.filter(p=>p.id!==id);
  if(activeId===id)activeId=products[0].id;
  renderTabs();renderProductPanel();calc();
}

function addProd(){
  const newP={id:nextId++,name:`商品${nextId-1}`,price:1980,shipFee:360,fbaFee:385,fbaStore:31};
  products.push(newP);
  activeId=newP.id;
  renderTabs();renderProductPanel();calc();
}

// Product panel
function renderProductPanel(){
  const p=activeProd();
  document.getElementById('product-panel').innerHTML=`
    <div class="prod-header">
      <input class="prod-name-input" type="text" value="${p.name}" placeholder="商品名" oninput="updateProd('name',this.value)">
    </div>
    <div class="prod-grid">
      <div class="ig">
        <label class="il">販売価格（税抜）</label>
        <div class="ir"><input type="number" value="${p.price}" min="1" step="10" oninput="updateProd('price',+this.value)"><span class="unit">円</span></div>
      </div>
      <div class="ig">
        <label class="il">佐川送料（60サイズ基準）</label>
        <select onchange="updateProd('shipFee',+this.value)">
          <option value="360" ${p.shipFee===360?'selected':''}>60サイズ・2kg（360円）</option>
          <option value="430" ${p.shipFee===430?'selected':''}>60サイズ・東北（430円）</option>
          <option value="460" ${p.shipFee===460?'selected':''}>80サイズ・2kg（460円）</option>
          <option value="576" ${p.shipFee===576?'selected':''}>80サイズ・東北（576円）</option>
          <option value="488" ${p.shipFee===488?'selected':''}>100サイズ（488円）</option>
          <option value="575" ${p.shipFee===575?'selected':''}>140サイズ（575円）</option>
        </select>
      </div>
      <div class="ig">
        <label class="il">FBA配送代行手数料</label>
        <select onchange="updateProd('fbaFee',+this.value)">
          <option value="288" ${p.fbaFee===288?'selected':''}>小型・250g以下（288円）</option>
          <option value="385" ${p.fbaFee===385?'selected':''}>標準・1kg以下（385円）</option>
          <option value="432" ${p.fbaFee===432?'selected':''}>標準・2kg以下（432円）</option>
          <option value="514" ${p.fbaFee===514?'selected':''}>標準・3kg以下（514円）</option>
          <option value="596" ${p.fbaFee===596?'selected':''}>標準・4kg以下（596円）</option>
        </select>
      </div>
      <div class="ig">
        <label class="il">FBA在庫保管手数料（目安）</label>
        <div class="ir"><input type="number" value="${p.fbaStore}" min="0" step="1" oninput="updateProd('fbaStore',+this.value)"><span class="unit">円/件</span></div>
      </div>
    </div>
  `;
}

function updateProd(key,val){
  const p=activeProd();
  p[key]=val;
  if(key==='name')renderTabs();
  calc();
}

// Main calc
const VOLS_TABLE=[300,500,1000,1500,2000,3000,4000,5000];
let chart=null;

function calc(){
  const fixed=getFixed();
  document.getElementById('fixed-total').textContent=fmt(fixed);
  const ogiFixed=getOgiFixed();
  document.getElementById('ogi-fixed-total').textContent=fmt(ogiFixed);

  const vol=getVol();
  const p=activeProd();
  const su=selfUnit(p.price,p.shipFee);
  const ou=ogiUnit(p.price,p.shipFee,vol);
  const mu=maxUnit(p.price,p.shipFee,vol);
  const fu=fbaUnit(p.price,p.fbaFee,p.fbaStore,vol);

  document.getElementById('chart-title').textContent=`${p.name} — 手取り / 件（出荷量別）`;
  document.getElementById('table-title').textContent=`${p.name} — 出荷量別 手取り比較表（円/件）`;

  renderCards(p,su,ou,mu,fu,vol);
  renderBreakeven(p,su,ou,mu,fu,vol,fixed);
  renderTable(p,vol);
  renderChart(p,vol);
  renderNote(fixed);
}

function renderCards(p,su,ou,mu,fu,vol){
  const amz=Math.round(p.price*getRate());
  const vals=[su,ou,mu,fu];
  const best=Math.max(...vals);
  document.getElementById('cards').innerHTML=`
    <div class="card${su===best?' best':''}">
      <div class="card-head"><span class="card-name">自社出荷</span><span class="badge badge-cur">現状</span></div>
      <div class="irow"><span>販売価格</span><span>${fmt(p.price)}円</span></div>

      <div class="irow cost"><span>出庫手数料</span><span>△${fmt(getOgiShukko())}円</span></div>

function renderBreakeven(p,su,ou,mu,fu,vol,fixed){
  const diffFvM=fu-mu;
  const diffFvS=fu-su;
  const diffOvS=ou-su;
  document.getElementById('be-bar').innerHTML=`
    <span class="be-label">差額</span>
    <span class="chip ${diffOvS>=0?'green':'red'}">扇橋 vs 自社: ${diffOvS>=0?'+':''}${fmt(diffOvS)}円/件</span>
    <span class="chip ${diffFvM>=0?'green':'red'}">FBA vs マックス: ${diffFvM>=0?'+':''}${fmt(diffFvM)}円/件</span>
    <span class="chip ${diffFvS>=0?'green':'red'}">FBA vs 自社: ${diffFvS>=0?'+':''}${fmt(diffFvS)}円/件</span>
  `;
}

function renderTable(p,vol){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const nearest=VOLS_TABLE.reduce((a,b)=>Math.abs(b-vol)<Math.abs(a-vol)?b:a);
  VOLS_TABLE.forEach(v=>{
    const tr=document.createElement('tr');
    if(v===nearest)tr.classList.add('hl');
    const su=selfUnit(p.price,p.shipFee);
    const ou=ogiUnit(p.price,p.shipFee,v);
    const mu=maxUnit(p.price,p.shipFee,v);
    const fu=fbaUnit(p.price,p.fbaFee,p.fbaStore,v);
    tr.innerHTML=`<td>${v.toLocaleString()}件</td><td>${wmsRate(v)}円</td><td>${fmt(getFixed()/v)}円</td><td>${fmt(su)}円</td><td>${fmt(ou)}円</td><td>${fmt(mu)}円</td><td>${fmt(fu)}円</td>`;
    tbody.appendChild(tr);
  });
}

function renderChart(p,vol){
  const ctx=document.getElementById('chart').getContext('2d');
  const labels=[];const ds=[],dogi=[],dm=[],df=[];
  for(let v=100;v<=5000;v+=50){
    labels.push(v);
    ds.push(Math.round(selfUnit(p.price,p.shipFee)));
    dogi.push(Math.round(ogiUnit(p.price,p.shipFee,v)));
    dm.push(Math.round(maxUnit(p.price,p.shipFee,v)));
    df.push(Math.round(fbaUnit(p.price,p.fbaFee,p.fbaStore,v)));
  }
  if(chart){chart.destroy();}
  chart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'自社出荷',data:ds,borderColor:'#6b6860',borderWidth:1.5,pointRadius:0,tension:0},
      {label:'扇橋',data:dogi,borderColor:'#2e6ea6',borderWidth:2,pointRadius:0,tension:0.1},
      {label:'マックス',data:dm,borderColor:'#b86a18',borderWidth:2,pointRadius:0,tension:0.1},
      {label:'FBA',data:df,borderColor:'#1a7a56',borderWidth:2,pointRadius:0,tension:0}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toLocaleString('ja-JP')}円/件`}}},
      scales:{
        x:{type:'linear',min:100,max:5000,ticks:{callback:v=>v>=1000?(v/1000)+'k':v,maxTicksLimit:8,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
        y:{ticks:{callback:v=>v.toLocaleString('ja-JP'),font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}
      }
    }
  });
}

function renderNote(fixed){
  const wmsText=document.getElementById('g-wms').options[document.getElementById('g-wms').selectedIndex].text;
  document.getElementById('note-text').textContent=
    `3PL固定費合計: ${fmt(fixed)}円/月（${wmsText} + 事務管理25,000円 + スペース${document.getElementById('g-tsubo').value}坪）。WMS課金: 〜299件15円 / 300〜999件10円 / 1,000〜1,999件6円 / 2,000件〜3円。全額税抜。`;
}

function onVol(){
  const vol=getVol();
  document.getElementById('vol-disp').textContent=vol.toLocaleString('ja-JP')+'件';
  calc();
}

// Init
renderTabs();
renderProductPanel();
calc();
</script>
